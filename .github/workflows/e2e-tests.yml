name: Playwright E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PORTAL_BASE_URL: https://portal.requitygroup.com

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          PORTAL_BASE_URL: ${{ env.PORTAL_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BORROWER_EMAIL: ${{ secrets.BORROWER_EMAIL }}
          INVESTOR_EMAIL: ${{ secrets.INVESTOR_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: failure()

    steps:
      - name: Create GitHub Issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const trigger = context.eventName === 'schedule' ? 'Scheduled (every 6 hours)' : `Push to ${context.ref}`;
            const title = `E2E Tests Failed — ${new Date().toISOString().slice(0, 10)}`;

            // Check for an existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### E2E tests failed again\n\n- **Trigger:** ${trigger}\n- **Run:** [View workflow run](${runUrl})\n- **Time:** ${new Date().toISOString()}`,
              });
              core.info(`Commented on existing issue #${existing.data[0].number}`);
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['e2e-failure', 'bug'],
                body: [
                  '## E2E Test Failure',
                  '',
                  `**Trigger:** ${trigger}`,
                  `**Run:** [View workflow run](${runUrl})`,
                  `**Time:** ${new Date().toISOString()}`,
                  '',
                  'The Playwright E2E test suite failed. Check the workflow run for details,',
                  'screenshots, and traces.',
                  '',
                  '### Next steps',
                  '',
                  '1. Click the workflow run link above',
                  '2. Download the `test-results` artifact for screenshots and traces',
                  '3. Download the `playwright-report` artifact for the full HTML report',
                  '4. Fix the failing tests and close this issue',
                ].join('\n'),
              });
              core.info('Created new failure issue');
            }
