name: E2E Tests

on:
  push:
    branches: [main]
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  BASE_URL: ${{ secrets.E2E_BASE_URL }}
  BORROWER_EMAIL: ${{ secrets.E2E_BORROWER_EMAIL }}
  BORROWER_PASSWORD: ${{ secrets.E2E_BORROWER_PASSWORD }}
  INVESTOR_EMAIL: ${{ secrets.E2E_INVESTOR_EMAIL }}
  INVESTOR_PASSWORD: ${{ secrets.E2E_INVESTOR_PASSWORD }}
  ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: e2e
    if: failure()

    steps:
      - name: Create GitHub Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `E2E Tests Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## E2E Test Failure',
              '',
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Branch:** ${context.ref}`,
              `**Trigger:** ${context.eventName}`,
              `**Time:** ${new Date().toISOString()}`,
              '',
              'Please check the Playwright report artifact for details.',
            ].join('\n');

            // Check for existing open issue to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'e2e-failure',
              per_page: 1,
            });

            if (issues.data.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['e2e-failure', 'bug'],
              });
            }
