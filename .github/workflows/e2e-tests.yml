name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  BASE_URL: ${{ secrets.E2E_BASE_URL }}
  BORROWER_EMAIL: ${{ secrets.E2E_BORROWER_EMAIL }}
  BORROWER_PASSWORD: ${{ secrets.E2E_BORROWER_PASSWORD }}
  INVESTOR_EMAIL: ${{ secrets.E2E_INVESTOR_EMAIL }}
  INVESTOR_PASSWORD: ${{ secrets.E2E_INVESTOR_PASSWORD }}
  ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$BASE_URL" ] && missing="$missing E2E_BASE_URL"
          [ -z "$BORROWER_EMAIL" ] && missing="$missing E2E_BORROWER_EMAIL"
          [ -z "$BORROWER_PASSWORD" ] && missing="$missing E2E_BORROWER_PASSWORD"
          [ -z "$INVESTOR_EMAIL" ] && missing="$missing E2E_INVESTOR_EMAIL"
          [ -z "$INVESTOR_PASSWORD" ] && missing="$missing E2E_INVESTOR_PASSWORD"
          [ -z "$ADMIN_EMAIL" ] && missing="$missing E2E_ADMIN_EMAIL"
          [ -z "$ADMIN_PASSWORD" ] && missing="$missing E2E_ADMIN_PASSWORD"
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && missing="$missing E2E_SUPABASE_URL"
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && missing="$missing E2E_SUPABASE_ANON_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Configure these in Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "All required E2E secrets are configured."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
