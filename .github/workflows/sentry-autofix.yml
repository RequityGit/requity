name: Sentry Auto-fix

on:
  schedule:
    - cron: '0 9 * * 1-5'  # Runs weekdays at 9am
  workflow_dispatch:         # Adds a manual "Run" button too

jobs:
  autofix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Sentry token
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::error::SENTRY_AUTH_TOKEN secret is not set. Add it in repo Settings > Secrets."
            exit 1
          fi
          echo "Sentry auth token is configured."
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Run Sentry fixes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: requity
        run: |
          claude --print "
            Using the Sentry MCP tools, fetch the top 5 unresolved issues for the 'requity' org by user impact.
            For each one: analyze the stack trace, fix the code, create a branch, and open a draft PR.
            Do not touch anything you are not confident about — skip it instead.
          "
