<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Borrower Message Email - Mockup</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <div style="max-width:560px;margin:0 auto;padding:40px 20px">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px">
      <img src="https://edhlkknvlczhbowasjna.supabase.co/storage/v1/object/public/brand-assets/Requity%20Logo%20Color.svg" alt="Requity Group" style="height:36px" />
    </div>

    <!-- Card -->
    <div style="background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;padding:32px">

      <h2 style="margin:0 0 4px;font-size:18px;font-weight:600;color:#0f172a">
        New Message on Your Loan
      </h2>
      <p style="margin:0 0 24px;font-size:14px;color:#64748b">
        Valor Quest Endeavors, LLC - Portfolio
      </p>

      <!-- Message preview -->
      <div style="background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;padding:16px;margin-bottom:24px">
        <div style="display:flex;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600;color:#0f172a">Dylan Marma</span>
          <span style="font-size:11px;color:#94a3b8;margin-left:8px">2 min ago</span>
        </div>
        <p style="margin:0;font-size:14px;color:#334155;line-height:1.5">
          Hi Joe, just following up on the appraisal report. Can you upload it when you get a chance?
        </p>
      </div>

      <!-- If batched: show count -->
      <!--
      <p style="margin:0 0 20px;font-size:13px;color:#64748b;text-align:center">
        + 2 more messages
      </p>
      -->

      <!-- CTA Button -->
      <div style="text-align:center;margin:24px 0 8px">
        <a href="https://portal.requitygroup.com/upload/abc123" style="display:inline-block;padding:12px 28px;background-color:#0f172a;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px">
          View &amp; Reply
        </a>
      </div>

      <p style="margin:16px 0 0;font-size:12px;color:#94a3b8;text-align:center">
        You can reply directly from your secure upload portal.
      </p>
    </div>

    <!-- Footer -->
    <div style="text-align:center;margin-top:24px">
      <p style="font-size:11px;color:#94a3b8;margin:0">
        Secured by Requity Group
      </p>
    </div>
  </div>
</body>
</html>
